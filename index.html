<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <h1>🎵 音乐播放器</h1>
        </div>

        <div class="player-info">
            <div class="current-song">
                <h2 id="song-title">未播放</h2>
                <p id="song-artist">请选择音乐</p>
            </div>
            <div class="album-cover">
                <div class="cover-placeholder">🎶</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="time-display">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
                <input type="range" id="progress-slider" class="progress-slider" min="0" max="100" value="0">
            </div>
        </div>

        <div class="controls">
            <button id="shuffle-btn" class="control-btn" title="随机播放">🔀</button>
            <button id="prev-btn" class="control-btn" title="上一首">⏮️</button>
            <button id="play-btn" class="control-btn play-pause" title="播放/暂停">▶️</button>
            <button id="next-btn" class="control-btn" title="下一首">⏭️</button>
            <button id="repeat-btn" class="control-btn" title="循环播放">🔁</button>
        </div>

        <div class="volume-control">
            <span>🔊</span>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="80">
            <span id="volume-value">80%</span>
        </div>

        <div class="playlist-container">
            <div class="playlist-header">
                <h3>播放列表</h3>
                <div class="playlist-controls">
                    <button id="sort-asc-btn" class="sort-btn" title="升序排列">⬆️</button>
                    <button id="sort-desc-btn" class="sort-btn" title="降序排列">⬇️</button>
                    <button id="shuffle-playlist-btn" class="sort-btn" title="随机排序">🔀</button>
                </div>
            </div>
            <div id="playlist" class="playlist">
                <div class="playlist-empty">正在加载音乐...</div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <script src="script.js"></script>
</body>
</html>
